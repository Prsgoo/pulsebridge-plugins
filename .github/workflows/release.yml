name: Release

on:
  push:
    tags:
      - "*-v*"

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package
        run: |
          TAG="${{ github.ref_name }}"
          PKG_NAME="${TAG%-v*}"
          PKG_PATH="packages/$PKG_NAME"
          VERSION=$(node -p "require('./$PKG_PATH/package.json').version")

          if [[ "$VERSION" == *-* ]]; then
            echo "Publishing $PKG_PATH@$VERSION as @beta"
            npm publish -w "$PKG_PATH" --tag beta
          else
            echo "Publishing $PKG_PATH@$VERSION as @latest"
            npm publish -w "$PKG_PATH"
          fi
