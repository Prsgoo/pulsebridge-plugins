name: Release

on:
  push:
    branches: [main, develop]

jobs:
  release-please-stable:
    name: Release Please (stable)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

  release-please-beta:
    name: Release Please (beta)
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest-beta.json
          target-branch: develop
          prerelease: true
          prerelease-type: beta
          token: ${{ secrets.GITHUB_TOKEN }}

  publish:
    name: Publish to npm
    needs: [release-please-stable, release-please-beta]
    if: |
      always() && (
        needs.release-please-stable.outputs.releases_created == 'true' ||
        needs.release-please-beta.outputs.releases_created == 'true'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC trusted publishing + provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      # Trusted Publishing (OIDC) requires npm >= 11.5.1; Node 22 ships an older npm.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - run: npm ci
      - run: npm run build

      # Publish only the packages release-please cut this run. Auth is via the
      # per-package OIDC trusted publisher configured on npm; provenance is
      # automatic. publishConfig.access=public is set in each package.json.
      - name: Publish released packages
        env:
          PATHS_RELEASED: ${{ needs.release-please-stable.outputs.paths_released || needs.release-please-beta.outputs.paths_released }}
        run: |
          echo "$PATHS_RELEASED" \
            | jq -r '.[]' \
            | while read -r pkg_path; do
                VERSION=$(node -p "require('./$pkg_path/package.json').version")
                if [[ "$VERSION" == *-* ]]; then
                  echo "Publishing $pkg_path as @beta"
                  npm publish -w "$pkg_path" --tag beta
                else
                  echo "Publishing $pkg_path as @latest"
                  npm publish -w "$pkg_path"
                fi
              done
